<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character set and responsive viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | Jigyasa</title>
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Main header section -->
    <header>
        <h1>Tic Tac Toe</h1>
    </header>

    <!-- Main content area -->
    <main>
        <div class="game-container">
            <h2 class="status">Player X's Turn</h2>
            <div class="board">
                <!-- 9 cells with data-index attribute to link UI with array -->
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button class="reset-btn">Restart Game</button>
        </div>
    </main>

    <!-- Footer section -->
    <footer>
        <p>Developed by Jigyasa Bishnoi</p>
    </footer>

    <!-- Link to external JavaScript file -->
    <script src="js/script.js"></script>
</body>
</html>
