<!DOCTYPE html>
<html lang="en">
<head>

    <title>RS School Clone Project</title>
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main>

            <h2 class="status">Player X's Turn</h2>
            <div class="board">

                <div class="cell"></div>

                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>

            <button class="reset-btn">Restart Game</button>
        </div>
    </main>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 RS School Clone Project</p>
    </footer>

    <!-- Link to external JavaScript file -->
